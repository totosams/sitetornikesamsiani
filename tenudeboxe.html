<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pantalons de Judo | JUDOGI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red: #e63946;
            --white: #f1faee;
            --dark: #1d3557;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('basdekim.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Kanit', sans-serif;
            color: white;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: clamp(2em, 5vw, 3.5em);
            text-transform: uppercase;
            margin-bottom: 50px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            border-bottom: 5px solid var(--red);
            text-align: center;
        }

        /* Grille des pantalons */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--red);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            margin-bottom: 20px;
        }

        .product-card h3 {
            font-size: 1.5em;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            background: var(--red);
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Bouton Retour */
        .btn-home {
            margin-top: 60px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.05);
            padding: 15px 40px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-home:hover {
            background: var(--white);
            color: var(--dark);
        }
    </style>
</head>
<body>

    <h1>NOS BAS DE KIMONO</h1>

    <div class="product-grid">
        <div class="product-card">
            <img src="pantalonbleu.png" alt="Pantalon Bleu">
            <h3>Pantalon Bleu</h3>
            <span class="badge">Compétition</span>
        </div>

        <div class="product-card">
            <img src="pantalonblanc.png" alt="Pantalon Blanc">
            <h3>Pantalon Blanc</h3>
            <span class="badge">Entraînement</span>
        </div>
    </div>

    <a href="index.html" class="btn-home">← Retour à JUDOGI STORE</a>

</body>
</html>
