<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vestes de Judo | JUDOGI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red: #e63946;
            --white: #f1faee;
            --dark: #1d3557;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('hautdekim.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Kanit', sans-serif;
            color: white;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: clamp(2.5em, 6vw, 4em);
            text-transform: uppercase;
            margin-bottom: 50px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            border-bottom: 6px solid var(--red);
            letter-spacing: 2px;
        }

        /* Grille des Vestes */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
            width: 100%;
            max-width: 1100px;
        }

        .jacket-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .jacket-card:hover {
            transform: translateY(-15px);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--red);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .jacket-card img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
            margin-bottom: 25px;
            transition: 0.5s;
        }

        .jacket-card:hover img {
            transform: scale(1.1);
        }

        .jacket-card h3 {
            font-size: 1.6em;
            margin: 15px 0;
            text-transform: uppercase;
        }

        .tag {
            background: var(--red);
            padding: 7px 25px;
            border-radius: 50px;
            font-size: 0.8em;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
        }

        /* Bouton Retour */
        .btn-home {
            margin-top: 80px;
            text-decoration: none;
            color: var(--white);
            background: transparent;
            padding: 15px 45px;
            border-radius: 50px;
            border: 2px solid var(--red);
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-home:hover {
            background: var(--red);
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.6);
        }
    </style>
</head>
<body>

    <h1>NOS HAUTS DE KIMONO</h1>

    <div class="product-grid">
        <div class="jacket-card">
            <img src="Kimonobleu.png" alt="Kimono Bleu">
            <h3>Veste Bleue</h3>
            <span class="tag">IJF Approved</span>
        </div>

        <div class="jacket-card">
            <img src="Kimonoblanc.png" alt="Kimono Blanc">
            <h3>Veste Blanche</h3>
            <span class="tag">Entraînement</span>
        </div>

        <div class="jacket-card">
            <img src="Dossard.png" alt="Dossard">
            <h3>Dossard Perso</h3>
            <span class="tag">Personnalisation</span>
        </div>
    </div>

    <a href="index.html" class="btn-home">← Retour au Store</a>

</body>
</html>
