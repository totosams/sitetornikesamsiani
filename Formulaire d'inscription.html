<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>REJOINDRE L'ÉLITE | JUDOGI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-red: #ff003c;
            --neon-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050505;
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 40px 0;
        }

        /* Particules en arrière-plan */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a, #000);
        }

        /* Cadre principal style Cyberpunk */
        .cyber-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(255,0,60,0.1);
            animation: slideUp 1s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 2.2em;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #fff, var(--neon-red), #fff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0%; }
            100% { background-position: 200%; }
        }

        .section-header {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--neon-red);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 30px 0 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-header::after {
            content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--neon-red), transparent);
        }

        /* Champs de saisie interactifs */
        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            background: var(--glass);
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.1em;
            transition: 0.4s;
            border-radius: 5px 5px 0 0;
        }

        input:focus, select:focus, textarea:focus {
            background: rgba(255, 0, 60, 0.05);
            border-bottom-color: var(--neon-red);
            outline: none;
            box-shadow: 0 10px 20px rgba(255, 0, 60, 0.1);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        /* Boutons Futuristes */
        .btn-panel { display: flex; gap: 20px; margin-top: 50px; }

        .btn-glitch {
            position: relative;
            flex: 1;
            padding: 20px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
            background: white;
            color: black;
            border-radius: 4px;
        }

        .btn-glitch:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 30px var(--neon-red);
            transform: scale(1.02);
        }

        .btn-cancel {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-cancel:hover { background: rgba(255,255,255,0.1); border-color: white; }

        /* Effet de scanline */
        .cyber-container::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none; opacity: 0.3;
        }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="particles" id="p-bg"></div>

<div class="cyber-container">
    <h1>ELITE RECRUITMENT</h1>
    
    <form>
        <div class="section-header">Identité du Combattant</div>
        <div class="grid">
            <div class="input-box">
                <input type="text" placeholder="NOM" required>
            </div>
            <div class="input-box">
                <input type="text" placeholder="PRÉNOM" required>
            </div>
        </div>

        <div class="grid">
            <div class="input-box">
                <input type="date" title="Date de naissance">
            </div>
            <div class="input-box" style="display:flex; align-items:center; gap:20px; background:var(--glass); padding:0 15px; border-radius:5px;">
                <label style="font-size:0.8em; color:var(--neon-red)">SEXE:</label>
                <label><input type="radio" name="s" style="width:auto"> M</label>
                <label><input type="radio" name="s" style="width:auto"> F</label>
            </div>
        </div>

        <div class="section-header">Spécifications Techniques</div>
        <div class="grid">
            <div class="input-box">
                <select>
                    <option disabled selected>GRADE ACTUEL</option>
                    <option>C. BLANCHE</option>
                    <option>C. MARRON</option>
                    <option>C. NOIRE</option>
                </select>
            </div>
            <div class="input-box">
                <select>
                    <option disabled selected>UNITÉ DE VILLE</option>
                    <option>NICE</option>
                    <option>PARIS</option>
                    <option>MARSEILLE</option>
                </select>
            </div>
        </div>

        <div class="input-box">
            <textarea rows="3" placeholder="ADRESSE DE RÉSIDENCE"></textarea>
        </div>

        <div class="section-header">Sécurisation des Données</div>
        <div class="grid">
            <div class="input-box">
                <input type="password" placeholder="MOT DE PASSE">
            </div>
            <div class="input-box">
                <input type="password" placeholder="CONFIRMATION">
            </div>
        </div>

        <div class="btn-panel">
            <button type="submit" class="btn-glitch">INITIALISER L'ADHÉSION</button>
            <button type="reset" class="btn-glitch btn-cancel">ANNULER</button>
        </div>
    </form>

    <a href="index.html" style="display:block; text-align:center; margin-top:30px; color:rgba(255,255,255,0.3); text-decoration:none; font-size:0.7em; letter-spacing:2px;">← RETOUR AU TERMINAL PRINCIPAL</a>
</div>

<script>
    // Animation simple de particules en JS
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    document.getElementById('p-bg').appendChild(canvas);
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    let dots = [];
    for(let i=0; i<100; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, v: Math.random()*0.5});

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 0, 60, 0.3)";
        dots.forEach(d => {
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
            ctx.fill();
            d.y -= d.v;
            if(d.y < 0) d.y = canvas.height;
        });
        requestAnimationFrame(draw);
    }
    draw();
</script>

</body>
</html>
